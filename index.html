<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FOX — Logo Directions</title>
<style>
  :root {
    --accent: #ff4d14;
    --dark: #1e232c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .grid {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: clamp(32px, 8vw, 96px);
    flex-wrap: wrap;
    padding: 32px;
  }
  .logo-link {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    border-radius: 16px;
    text-decoration: none;
    cursor: pointer;
  }
  .logo-link img {
    height: clamp(64px, 9vw, 120px);
    width: auto;
    display: block;
    transition: transform 0.2s ease;
  }
  .logo-link:hover img,
  .logo-link:focus-visible img {
    transform: scale(1.12);
  }
  .logo-link:focus-visible {
    outline: 2px solid var(--dark);
    outline-offset: 4px;
  }
</style>
</head>
<body>

<div class="grid">
  <a class="logo-link" href="switcher.html?d=d1" aria-label="View Direction 1">
    <img src="icons/d1-icon.png" alt="Direction 1 logo" />
  </a>
  <a class="logo-link" href="switcher.html?d=d2" aria-label="View Direction 2">
    <img src="icons/d2-icon.png" alt="Direction 2 logo" />
  </a>
  <a class="logo-link" href="switcher.html?d=d4" aria-label="View Direction 4">
    <img src="icons/d4-icon.png" alt="Direction 4 logo" />
  </a>
  <a class="logo-link" href="switcher.html?d=d6" aria-label="View Direction 6">
    <img src="icons/d6-icon.png" alt="Direction 6 logo" />
  </a>
  <a class="logo-link" href="switcher.html?d=d7" aria-label="View Direction 7">
    <img src="icons/d7-icon.png" alt="Direction 7 logo" />
  </a>
</div>

</body>
</html>
